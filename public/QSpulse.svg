<svg width="980" height="260" viewBox="0 0 980 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brand gradient -->
    <linearGradient id="qsGradient" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e2a47" />
      <stop offset="1" stop-color="#8a6cff" />
    </linearGradient>

    <linearGradient id="pulseGradient" x1="0" y1="0" x2="260" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e2a47" />
      <stop offset="1" stop-color="#8a6cff" />
    </linearGradient>

    <!-- Subtle shadow for modern depth (optional) -->
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0e2a47" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- ICON -->
  <g filter="url(#softShadow)" transform="translate(60,48)">
    <!-- speech bubble -->
    <path d="M44 16C44 7.163 51.163 0 60 0H184C206.091 0 224 17.909 224 40V92C224 114.091 206.091 132 184 132H106L70 164V132H60C51.163 132 44 124.837 44 116V16Z" fill="url(#qsGradient)" />

    <!-- waveform (clean, rounded, modern) -->
    <path d="M78 70H104
         C110 70 112 64 114 58
         L120 40
         C122 34 126 34 128 40
         L140 92
         C142 98 146 98 148 92
         L158 58
         C160 52 162 50 168 50
         H190" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.98" />
  </g>

  <!-- WORDMARK -->
  <g transform="translate(320,86)">
    <!-- QS (solid quantum blue) -->
    <text x="0" y="78" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="-2" fill="#0e2a47">QS</text>

    <!-- Pulse (gradient) -->
    <text x="135" y="78" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="-2" fill="url(#pulseGradient)">Pulse</text>
  </g>
</svg>
